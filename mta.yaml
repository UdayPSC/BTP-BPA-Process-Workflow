_schema-version: "3.2"
ID: NorthwindOrderReview
version: 0.0.1
modules:
- name: workflow-module
  type: com.sap.application.content
  path: workflow-module
  requires:
  - name: sap_processautomation
    parameters:
      content-target: true
      service-key:
        config:
          deployUsageScenario: workflow
        name: spa-workflow-service-key
- name: NorthwindOrderReview-destination-content
  type: com.sap.application.content
  requires:
  - name: NorthwindOrderReview-destination-service
    parameters:
      content-target: true
  - name: NorthwindOrderReview_html_repo_host
    parameters:
      service-key:
        name: NorthwindOrderReview_html_repo_host-key
  - name: uaa_NorthwindOrderReview
    parameters:
      service-key:
        name: uaa_NorthwindOrderReview-key
  parameters:
    content:
      instance:
        destinations:
        - Name: ProcessWorkflowAppRouter_NorthwindOrderReview_html_repo_host
          ServiceInstanceName: NorthwindOrderReview-html5-app-host-service
          ServiceKeyName: NorthwindOrderReview_html_repo_host-key
          sap.cloud.service: ProcessWorkflowAppRouter
        - Authentication: OAuth2UserTokenExchange
          Name: ProcessWorkflowAppRouter_uaa_NorthwindOrderReview
          ServiceInstanceName: NorthwindOrderReview-xsuaa-service
          ServiceKeyName: uaa_NorthwindOrderReview-key
          sap.cloud.service: ProcessWorkflowAppRouter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
resources:
- name: sap_processautomation
  type: org.cloudfoundry.managed-service
  parameters:
    service: process-automation-service
    service-plan: standard
- name: NorthwindOrderReview-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      version: 1.0.0
    service: destination
    service-name: NorthwindOrderReview-destination-service
    service-plan: lite
- name: NorthwindOrderReview_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: NorthwindOrderReview-html5-app-host-service
    service-plan: app-host
- name: uaa_NorthwindOrderReview
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: NorthwindOrderReview-xsuaa-service
    service-plan: application
